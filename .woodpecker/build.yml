when:
  - event: push
    branch:
      - main
      - master
  - event: manual

labels:
  backend: local
  platform: darwin/amd64

steps:
  build-macos:
    image: bash
    commands:
      - date +%s > .tekljer_action_started_at
      - xcodebuild -version
      - command -v create-dmg
      - |
        xcodebuild \
          -project "Dump1090 macOS GUI.xcodeproj" \
          -scheme "Dump1090 macOS GUI" \
          -configuration Release \
          -destination "platform=macOS" \
          ARCHS="arm64 x86_64" \
          ONLY_ACTIVE_ARCH=NO \
          BUILD_DIR=build \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_IDENTITY="" \
          clean build
      - mkdir -p artifacts
      - |
        create-dmg \
          --volname "Dump1090MAC" \
          --window-pos 200 120 \
          --window-size 600 400 \
          --icon-size 128 \
          --icon "Dump1090 macOS GUI.app" 150 150 \
          --hide-extension "Dump1090 macOS GUI.app" \
          --app-drop-link 450 150 \
          "artifacts/Dump1090MAC.dmg" \
          "build/Release/Dump1090 macOS GUI.app"
      - |
        (
          cd build/Release
          zip -r "../../artifacts/Dump1090MAC.zip" "Dump1090 macOS GUI.app"
        )
      - ls -lah artifacts

  post-to-main-pc:
    image: bash
    depends_on:
      - build-macos
    environment:
      UPLOAD_TOKEN:
        from_secret: upload_token
      TEKLJER_SERVER: http://tekljer:8000
      TEKLJER_JOB: macos-release
    commands:
      - ls -lah artifacts
      - command -v curl
      - command -v jq
      - curl -fsSL "$TEKLJER_SERVER/ci/v1/upload.sh" | sh
